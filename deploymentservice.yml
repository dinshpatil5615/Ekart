apiVersion: apps/v1
kind: Deployment
metadata:
  name: ekart-deployment
spec:
  selector:
    matchLabels:
      app: ekart
  replicas: 2
  template:
    metadata:
      labels:
        app: ekart
    spec:
      containers:
        - name: ekart
          image: dineshpatil0908/ekart:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8070

---
apiVersion: v1
kind: Service
metadata:
  name: ekart-ssvc
  labels:
    app: ekart        ← Add this — Service needs label
spec:
  selector:
    app: ekart
  ports:
    - protocol: "TCP"
      port: 8070
      targetPort: 8070
      name: http      ← Add this — ServiceMonitor needs named port
  type: LoadBalancer
